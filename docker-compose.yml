services:

  postgres:
    image: postgres:16-alpine
    container_name: hrms_db
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: hrms_db

    ports:
      - "5435:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hrms_db"]
      interval: 5s
      timeout: 5s
      retries: 10


  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend

    container_name: hrms_backend

    env_file:
      - ./backend/.env

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"


  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend

    container_name: hrms_frontend

    restart: unless-stopped

    env_file:
      - ./frontend/.env

    depends_on:
      - backend

    ports:
      - "3001:3000"

volumes:
  pgdata:
